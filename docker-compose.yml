version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stalknet-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-stalknet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stalknet_secret}
      POSTGRES_DB: ${DB_NAME:-stalknet}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stalknet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stalknet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stalknet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stalknet-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: stalknet-gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth:8081
      - USER_SERVICE_URL=http://user:8082
      - CHAT_SERVICE_URL=http://chat:8083
      - TASK_SERVICE_URL=http://task:8084
      - COMPLIANCE_SERVICE_URL=http://compliance:8086
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
    depends_on:
      - auth
      - user
      - chat
      - task
      - compliance
    networks:
      - stalknet-network

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: stalknet-auth
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-stalknet}
      - DB_PASSWORD=${DB_PASSWORD:-stalknet_secret}
      - DB_NAME=${DB_NAME:-stalknet}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
    depends_on:
      - postgres
      - redis
    networks:
      - stalknet-network

  user:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: stalknet-user
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-stalknet}
      - DB_PASSWORD=${DB_PASSWORD:-stalknet_secret}
      - DB_NAME=${DB_NAME:-stalknet}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - stalknet-network

  chat:
    build:
      context: ./services/chat
      dockerfile: Dockerfile
    container_name: stalknet-chat
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-stalknet}
      - DB_PASSWORD=${DB_PASSWORD:-stalknet_secret}
      - DB_NAME=${DB_NAME:-stalknet}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - COMPLIANCE_SERVICE_URL=http://compliance:8086
    depends_on:
      - postgres
      - redis
      - compliance
    networks:
      - stalknet-network

  task:
    build:
      context: ./services/task
      dockerfile: Dockerfile
    container_name: stalknet-task
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-stalknet}
      - DB_PASSWORD=${DB_PASSWORD:-stalknet_secret}
      - DB_NAME=${DB_NAME:-stalknet}
    depends_on:
      - postgres
    networks:
      - stalknet-network

  notification:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    container_name: stalknet-notification
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - stalknet-network

  compliance:
    build:
      context: ./services/compliance
      dockerfile: Dockerfile
    container_name: stalknet-compliance
    ports:
      - "8086:8086"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-stalknet}
      - DB_PASSWORD=${DB_PASSWORD:-stalknet_secret}
      - DB_NAME=${DB_NAME:-stalknet}
      - PORT=8086
    depends_on:
      - postgres
    networks:
      - stalknet-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  stalknet-network:
    driver: bridge
