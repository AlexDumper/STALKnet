# Redis конфигурация для STALKnet

# Порт
port 6379

# Привязка ко всем интерфейсам (для Docker)
# В продакшене рекомендуется bind 127.0.0.1 если Redis только для локальных сервисов
bind 0.0.0.0

# Пароль (ОБЯЗАТЕЛЬНО в продакшене!)
# requirepass ИЗМЕНИТЕ_НА_СЛОЖНЫЙ_ПАРОЛЬ

# Лимит памяти
maxmemory 256mb
maxmemory-policy allkeys-lru

# Персистентность
appendonly yes
appendfsync everysec

# Логирование
loglevel notice

# Безопасность (продакшн)
# Отключаем опасные команды
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG ""

# Таймаут соединений (0 = отключен)
timeout 300

# TCP keepalive
tcp-keepalive 60
