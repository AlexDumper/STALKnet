# Redis конфигурация для STALKnet

# Порт
port 6379

# Привязка ко всем интерфейсам (для Docker)
bind 0.0.0.0

# Без пароля для разработки
# requirepass your_password

# Лимит памяти
maxmemory 256mb
maxmemory-policy allkeys-lru

# Персистентность
appendonly yes
appendfsync everysec

# Логирование
loglevel notice
