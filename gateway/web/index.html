<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>STALKnet</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☢</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            overflow: hidden !important;
            scrollbar-width: none !important;
            -ms-overflow-style: none !important;
            height: 100%;
        }
        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none !important;
        }
        body {
            background: #1a1a1a;
            color: #e6e6e6;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            line-height: 1.2;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            padding: 10px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }
        .header {
            background: #3c3d4a;
            color: #e0deee;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #444444;
            border-bottom: 1px solid #444444;
            letter-spacing: 1px;
            flex-shrink: 0;
            font-weight: bold;
        }
        .header-left {
            display: flex;
            align-items: center;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-decorator {
            color: #e0deee;
            margin: 0 5px;
        }
        .version {
            color: #e0deee;
            font-size: 16px;
            margin-left: 10px;
            opacity: 1;
            font-weight: bold;
        }
        .username-display {
            color: #cf9c4e;
            font-size: 14px;
            font-weight: normal;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
            animation: blink 1.5s infinite;
        }
        .status-disconnected {
            background-color: #ff0000;
            box-shadow: 0 0 5px #ff0000;
        }
        .status-guest {
            background-color: #ffff00;
            box-shadow: 0 0 5px #ffff00;
        }
        .status-connected {
            background-color: #00ff00;
            box-shadow: 0 0 5px #00ff00;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .messages {
            flex: 1;
            border-left: none;
            border-right: none;
            padding: 5px;
            background: #1a1a1a;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .messages::-webkit-scrollbar {
            display: none;
        }
        .message {
            margin: 2px 0;
            padding-left: 8px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
        }
        .message.system { color: #cccccc; }
        .message.task { color: #cf9c4e; }
        .message.user { color: #cdc0b0; }
        .input-area {
            display: flex;
            gap: 10px;
            padding: 8px 0;
            align-items: center;
            flex-shrink: 0;
        }
        #messageInput {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #444444;
            color: #e6e6e6;
            padding: 10px;
            font-size: 18px;
            font-family: Arial, Helvetica, sans-serif;
            min-width: 0;
        }
        #messageInput::placeholder {
            color: #666666;
        }
        #messageInput:focus { 
            outline: none;
            border-color: #666666;
        }
        #sendBtn {
            background: #e6e6e6;
            color: #2a2a2a;
            font-weight: bold;
            padding: 10px 20px;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
            border: 1px solid #444444;
            flex-shrink: 0;
            min-width: 120px;
        }
        #sendBtn:hover { 
            background: #ffffff;
            color: #1a1a1a;
            border-color: #666666;
        }
        .timestamp { color: #666666; margin-right: 10px; white-space: nowrap; }
        .divider {
            color: #444444;
            text-align: center;
            letter-spacing: 3px;
            margin: 5px 0;
        }
        .icon {
            margin-right: 8px;
        }
        .username {
            color: #cccccc;
            font-weight: bold;
            margin-right: 5px;
            cursor: pointer;
        }
        .username:hover {
            color: #ffffff;
        }
        .message.reply {
            color: #cccccc;
        }
        
        /* Адаптация для мобильных устройств */
        @media (max-width: 768px) {
            body {
                font-size: 20px;
            }
            .container {
                padding: 0;
                height: 100vh;
                height: 100dvh;
            }
            .header {
                padding: 8px 10px;
                font-size: 18px;
            }
            .version {
                font-size: 16px;
                margin-left: 8px;
                color: #cccccc;
                font-weight: bold;
            }
            .messages {
                border-left: none;
                border-right: none;
                padding: 8px;
            }
            .input-area {
                padding: 8px 10px;
                gap: 8px;
            }
            #messageInput {
                font-size: 20px;
                padding: 8px;
            }
            #sendBtn {
                padding: 8px 20px;
                font-size: 18px;
                min-width: 100px;
            }
            .input-label {
                display: none;
            }
            .message {
                font-size: 18px;
                margin: 2px 0;
            }
            .timestamp {
                font-size: 18px;
                margin-right: 6px;
            }
            .username {
                font-size: 18px;
            }
        }

        /* Очень маленькие экраны */
        @media (max-width: 480px) {
            body {
                font-size: 20px;
            }
            .header {
                padding: 6px 8px;
                font-size: 18px;
            }
            .version {
                font-size: 16px;
                margin-left: 6px;
                color: #cccccc;
                font-weight: bold;
            }
            #messageInput {
                font-size: 20px;
                padding: 6px;
            }
            #sendBtn {
                padding: 6px 20px;
                font-size: 18px;
                min-width: 90px;
            }
            .message {
                font-size: 18px;
            }
            .timestamp {
                font-size: 18px;
            }
            .username {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <span>
                    <span class="header-decorator">☢</span> STALKnet 
                    <span id="versionDisplay" class="version">v0.1.12</span>
                </span>
            </div>
            <div class="header-right">
                <span id="usernameDisplay" class="username-display">Guest</span>
                <span id="statusDisplay"><span class="status-indicator status-guest" id="statusLight"></span></span>
            </div>
        </div>
        <div id="messages" class="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение или /команду..." autofocus>
            <button id="sendBtn">SEND</button>
        </div>
    </div>
    <script src="app.js?v=0.1.12" defer></script>
</body>
</html>
