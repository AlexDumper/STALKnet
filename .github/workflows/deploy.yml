# CI/CD для развёртывания STALKnet на production-сервере
# Автоматическое развёртывание при пуше в main ветку

name: Deploy to Production

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== BUILD ====================
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' client/web/app.js | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.sha }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Gateway
      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          file: ./gateway/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Auth Service
      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth
          file: ./services/auth/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # User Service
      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/user
          file: ./services/user/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/user:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/user:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Chat Service
      - name: Build and push Chat Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/chat
          file: ./services/chat/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/chat:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/chat:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Task Service
      - name: Build and push Task Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/task
          file: ./services/task/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/task:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/task:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Notification Service
      - name: Build and push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/notification
          file: ./services/notification/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/notification:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/notification:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== DEPLOY ====================
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' client/web/app.js | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.sha }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Create backup
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/STALKnet
            docker-compose -f docker-compose.prod.yml down
            
            # Бэкап БД
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            docker exec stalknet-postgres pg_dump -U stalknet stalknet > /opt/backups/db_backup_$TIMESTAMP.sql
            
            # Бэкап конфигов
            tar -czf /opt/backups/config_backup_$TIMESTAMP.tar.gz .env.production docker-compose.prod.yml
            
            echo "Backup completed: $TIMESTAMP"
          EOF

      - name: Pull latest changes
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/STALKnet
            git pull origin main
          EOF

      - name: Update environment file
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/STALKnet
            if [ ! -f .env.production ]; then
              cp .env.production.example .env.production
              echo "Created .env.production from example"
            fi
          EOF

      - name: Pull new Docker images
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/STALKnet
            
            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull images
            docker-compose -f docker-compose.prod.yml pull
          EOF

      - name: Rebuild and restart services
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/STALKnet
            docker-compose -f docker-compose.prod.yml up -d --build
          EOF

      - name: Wait for health checks
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/STALKnet
            echo "Waiting 30 seconds for services to start..."
            sleep 30
            
            # Check health
            echo "Checking health endpoints..."
            curl -f http://localhost:8080/health || exit 1
            curl -f http://localhost:8081/health || exit 1
            curl -f http://localhost:8083/health || exit 1
            
            echo "All health checks passed!"
          EOF

      - name: Cleanup old images
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            docker image prune -f
          EOF

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployed version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Server:** http://${{ secrets.PRODUCTION_HOST }}:8080" >> $GITHUB_STEP_SUMMARY

  # ==================== ROLLBACK ====================
  rollback:
    name: Rollback (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback to previous version
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/STALKnet
            
            # Откат к предыдущему коммиту
            git fetch
            git reset --hard HEAD~1
            
            # Пересборка
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d --build
            
            echo "Rollback completed!"
          EOF
