<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STALKnet Web Client</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #0f0; font-family: Consolas, monospace; font-size: 14px; }
        .container { display: flex; flex-direction: column; height: 100vh; padding: 10px; }
        .header { background: #0f0; color: #000; padding: 10px; font-weight: bold; display: flex; justify-content: space-between; }
        .messages { flex: 1; overflow-y: auto; border: 1px solid #0f0; padding: 10px; margin: 10px 0; background: #001100; }
        .message { margin: 5px 0; }
        .message.system { color: #0f0; }
        .message.task { color: #ff0; }
        .message.user { color: #0ff; }
        .input-area { display: flex; gap: 10px; }
        #messageInput { flex: 1; background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; font-size: 14px; }
        #messageInput:focus { outline: none; border-color: #0ff; }
        #sendBtn { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #sendBtn:hover { background: #0ff; }
        .help { color: #0a0; font-size: 12px; margin-top: 5px; }
        .timestamp { color: #0a0; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span>STALKnet</span>
            <span id="userDisplay">user: guest</span>
            <span id="statusDisplay">[*] Connecting...</span>
        </div>
        <div id="messages" class="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message or /command..." autofocus>
            <button id="sendBtn">SEND</button>
        </div>
        <div class="help">Commands: /help /clear /nick /connect /quit /mock /mockmsg /mocktask | Ctrl+L: clear</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
