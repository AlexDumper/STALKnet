<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STALKnet Web Client</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #00cc00; 
            font-family: monospace; 
            font-size: 18px;
            line-height: 1.5;
        }
        .container { display: flex; flex-direction: column; height: 100vh; padding: 10px; }
        .header { 
            background: #001100; 
            color: #00cc00; 
            padding: 10px; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between;
            border: 1px solid #006600;
        }
        .messages { 
            flex: 1; 
            overflow-y: auto; 
            border: 1px solid #006600; 
            padding: 10px; 
            margin: 10px 0; 
            background: #001100; 
        }
        .message { margin: 5px 0; }
        .message.system { color: #009900; }
        .message.task { color: #cccc00; }
        .message.user { color: #00cccc; }
        .input-area { display: flex; gap: 10px; }
        #messageInput { 
            flex: 1; 
            background: #000; 
            border: 1px solid #006600; 
            color: #00cc00; 
            padding: 10px; 
            font-size: 18px;
            font-family: monospace;
        }
        #messageInput:focus { outline: none; border-color: #009900; }
        #sendBtn { 
            background: #006600; 
            color: #00cc00; 
            border: 1px solid #006600; 
            padding: 10px 20px; 
            cursor: pointer; 
            font-weight: bold;
            font-family: monospace;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #sendBtn:hover { background: #009900; color: #00ff00; }
        .help { color: #006600; font-size: 14px; margin-top: 5px; }
        .timestamp { color: #006600; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span>STALKnet</span>
            <span id="userDisplay">user: guest</span>
            <span id="statusDisplay">[*] Connecting...</span>
        </div>
        <div id="messages" class="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message or /command..." autofocus>
            <button id="sendBtn">SEND</button>
        </div>
        <div class="help">Commands: /help /clear /nick /connect /quit /mock /mockmsg /mocktask | Ctrl+L: clear</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
