<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STALKnet Web Client</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #00cc00;
            font-family: monospace;
            font-size: 18px;
            line-height: 1.2;
        }
        .container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            padding: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header { 
            background: #001100; 
            color: #00cc00; 
            padding: 5px 10px;
            display: flex; 
            justify-content: space-between;
            border-top: 1px solid #006600;
            border-bottom: 1px solid #006600;
            letter-spacing: 1px;
        }
        .header-decorator {
            color: #006600;
            margin: 0 5px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            border-left: 1px solid #006600;
            border-right: 1px solid #006600;
            padding: 5px;
            margin: 5px 0;
            background: #001100;
            position: relative;
        }
        .messages::before {
            content: '╔════════════════════════════════════════════════════════════════════════════════╗';
            display: block;
            color: #006600;
            margin-bottom: 5px;
        }
        .messages::after {
            content: '╚════════════════════════════════════════════════════════════════════════════════╝';
            display: block;
            color: #006600;
            margin-top: 5px;
        }
        .message {
            margin: 2px 0;
            padding-left: 10px;
            border-left: 1px dotted #004400;
        }
        .message.system { color: #009900; }
        .message.task { color: #cccc00; }
        .message.user { color: #00cccc; }
        .input-area { 
            display: flex; 
            gap: 10px;
            padding: 5px 0;
        }
        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .input-prefix {
            color: #00cc00;
            font-weight: bold;
        }
        #messageInput { 
            flex: 1; 
            background: #000; 
            border: none;
            color: #00cc00; 
            padding: 10px; 
            font-size: 18px;
            font-family: monospace;
        }
        #messageInput:focus { outline: none; }
        #sendBtn { 
            background: transparent;
            color: #00cc00; 
            padding: 10px 15px; 
            cursor: pointer; 
            font-family: monospace;
            font-size: 16px;
            border: none;
        }
        #sendBtn:hover { color: #00ff00; }
        .timestamp { color: #006600; margin-right: 10px; }
        .divider {
            color: #004400;
            text-align: center;
            letter-spacing: 3px;
            margin: 5px 0;
        }
        .icon {
            margin-right: 8px;
        }
        .username {
            color: #00ff00;
            font-weight: bold;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span><span class="header-decorator">☢</span> STALKnet</span>
            <span id="userDisplay">├ user: guest ┤</span>
            <span id="statusDisplay"><span class="header-decorator">[</span>*<span class="header-decorator">]</span> Connecting...</span>
        </div>
        <div id="messages" class="messages"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <span class="input-prefix">[</span>
                <input type="text" id="messageInput" placeholder="Введите сообщение или /команду..." autofocus>
                <span class="input-prefix">]</span>
            </div>
            <button id="sendBtn">[SEND]</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
