<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STALKnet</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☢</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #00cc00;
            font-family: monospace;
            font-size: 18px;
            line-height: 1.2;
        }
        .container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            padding: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: #001100;
            color: #00cc00;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #006600;
            border-bottom: 1px solid #006600;
            letter-spacing: 1px;
        }
        .header-decorator {
            color: #006600;
            margin: 0 5px;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
            animation: blink 1.5s infinite;
        }
        .status-disconnected {
            background-color: #ff0000;
            box-shadow: 0 0 5px #ff0000;
        }
        .status-guest {
            background-color: #ffff00;
            box-shadow: 0 0 5px #ffff00;
        }
        .status-connected {
            background-color: #00ff00;
            box-shadow: 0 0 5px #00ff00;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            border-left: 1px solid #006600;
            border-right: 1px solid #006600;
            padding: 5px;
            margin: 5px 0;
            background: #001100;
            position: relative;
        }
        .message {
            margin: 2px 0;
            padding-left: 10px;
            border-left: 1px dotted #004400;
        }
        .message.system { color: #009900; }
        .message.task { color: #99aa00; }
        .message.user { color: #ccffcc; }
        .input-area {
            display: flex;
            gap: 10px;
            padding: 5px 0;
            align-items: center;
        }
        .input-label {
            color: #00cc00;
            font-weight: bold;
            white-space: nowrap;
        }
        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .input-prefix {
            color: #00cc00;
            font-weight: bold;
        }
        #messageInput { 
            flex: 1; 
            background: #000; 
            border: none;
            color: #00cc00; 
            padding: 10px; 
            font-size: 18px;
            font-family: monospace;
        }
        #messageInput:focus { outline: none; }
        #sendBtn { 
            background: transparent;
            color: #00cc00; 
            padding: 10px 15px; 
            cursor: pointer; 
            font-family: monospace;
            font-size: 16px;
            border: none;
        }
        #sendBtn:hover { color: #00ff00; }
        .timestamp { color: #006600; margin-right: 10px; }
        .divider {
            color: #004400;
            text-align: center;
            letter-spacing: 3px;
            margin: 5px 0;
        }
        .icon {
            margin-right: 8px;
        }
        .username {
            color: #00ff00;
            font-weight: bold;
            margin-right: 5px;
            cursor: pointer;
        }
        .username:hover {
            color: #00ffff;
        }
        .message.reply {
            color: #00ff00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span><span class="header-decorator">☢</span> STALKnet</span>
            <span id="statusDisplay"><span class="status-indicator status-guest" id="statusLight"></span></span>
        </div>
        <div id="messages" class="messages"></div>
        <div class="input-area">
            <span class="input-label" id="inputLabel">Guest:</span>
            <div class="input-wrapper">
                <span class="input-prefix">[</span>
                <input type="text" id="messageInput" placeholder="Введите сообщение или /команду..." autofocus>
                <span class="input-prefix">]</span>
            </div>
            <button id="sendBtn">[SEND]</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
